<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASK BLASTER 9000</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --space-dark: #02020f;
    --space-mid: #070720;
    --neon-cyan: #00ffff;
    --neon-pink: #ff00aa;
    --neon-yellow: #ffee00;
    --neon-green: #00ff88;
    --laser-red: #ff3300;
    --laser-orange: #ff8800;
    --meteor-brown: #8B4513;
    --meteor-grey: #888;
    --pixel-size: 3px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--space-dark);
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: none;
  }

  /* ─── STARFIELD ─── */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ─── PERSPECTIVE GRID (floor) ─── */
  #grid-floor {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 45%;
    z-index: 1;
    overflow: hidden;
  }

  #grid-floor canvas { width: 100%; height: 100%; }

  /* ─── GAME CANVAS ─── */
  #gameCanvas {
    position: fixed;
    inset: 0;
    z-index: 2;
  }

  /* ─── HUD ─── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }

  .hud-box {
    background: rgba(0,0,0,0.7);
    border: 2px solid var(--neon-cyan);
    padding: 8px 12px;
    color: var(--neon-cyan);
    font-size: 8px;
    image-rendering: pixelated;
    box-shadow: 0 0 10px var(--neon-cyan), inset 0 0 10px rgba(0,255,255,0.05);
    text-shadow: 0 0 8px var(--neon-cyan);
    line-height: 1.8;
  }

  .hud-box .label { color: var(--neon-pink); }
  .hud-box .val { color: #fff; }

  /* ─── TASK INPUT PANEL ─── */
  #task-panel {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    width: min(500px, 90vw);
    background: rgba(2,2,20,0.92);
    border: 3px solid var(--neon-pink);
    border-bottom: none;
    padding: 12px 16px 16px;
    box-shadow: 0 0 20px var(--neon-pink), 0 -5px 40px rgba(255,0,170,0.3);
  }

  #task-panel h2 {
    color: var(--neon-yellow);
    font-size: 7px;
    text-align: center;
    margin-bottom: 10px;
    text-shadow: 0 0 10px var(--neon-yellow);
    letter-spacing: 2px;
  }

  #task-input-row {
    display: flex;
    gap: 8px;
  }

  #task-input {
    flex: 1;
    background: rgba(0,255,255,0.05);
    border: 2px solid var(--neon-cyan);
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 8px;
    outline: none;
    caret-color: var(--neon-cyan);
    text-shadow: 0 0 6px #fff;
    box-shadow: inset 0 0 8px rgba(0,255,255,0.1);
  }

  #task-input::placeholder { color: #334; }

  #add-btn {
    background: var(--neon-pink);
    border: none;
    color: #000;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 8px 10px;
    cursor: pointer;
    image-rendering: pixelated;
    transition: transform 0.1s;
    box-shadow: 0 0 12px var(--neon-pink);
    white-space: nowrap;
  }

  #add-btn:hover { transform: scale(1.05); filter: brightness(1.3); }
  #add-btn:active { transform: scale(0.95); }

  /* ─── TASK LIST SIDEBAR ─── */
  #task-sidebar {
    position: fixed;
    left: 16px;
    top: 80px;
    bottom: 80px;
    width: 180px;
    z-index: 10;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #task-sidebar h3 {
    color: var(--neon-green);
    font-size: 6px;
    text-shadow: 0 0 8px var(--neon-green);
    margin-bottom: 4px;
    padding: 4px 8px;
    border-bottom: 1px solid var(--neon-green);
  }

  .task-entry {
    background: rgba(0,0,0,0.6);
    border: 1px solid #333;
    border-left: 3px solid var(--neon-yellow);
    color: #aaa;
    font-size: 5px;
    padding: 5px 7px;
    line-height: 1.5;
    cursor: pointer;
    transition: all 0.15s;
    word-break: break-all;
  }

  .task-entry:hover {
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
    background: rgba(0,255,255,0.05);
    box-shadow: 0 0 6px rgba(0,255,255,0.3);
  }

  .task-entry.destroyed {
    text-decoration: line-through;
    color: #333;
    border-left-color: #333;
    opacity: 0.4;
  }

  .task-hp {
    margin-top: 3px;
    font-size: 5px;
    color: #00ff88;
    letter-spacing: 1px;
    text-shadow: 0 0 4px #00ff88;
  }

  /* ─── CROSSHAIR ─── */
  #crosshair {
    position: fixed;
    pointer-events: none;
    z-index: 30;
    transform: translate(-50%, -50%);
  }

  /* ─── FLASH / MUZZLE ─── */
  .muzzle-flash {
    position: fixed;
    pointer-events: none;
    z-index: 25;
    border-radius: 50%;
    animation: flashOut 0.15s forwards;
  }

  @keyframes flashOut {
    0% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(3); }
  }

  /* ─── EXPLOSION TEXT ─── */
  .boom-text {
    position: fixed;
    pointer-events: none;
    z-index: 30;
    color: var(--neon-yellow);
    font-size: 10px;
    text-shadow: 0 0 10px var(--neon-yellow);
    animation: boomFly 0.8s forwards;
    transform: translate(-50%, -50%);
  }

  @keyframes boomFly {
    0% { opacity: 1; transform: translate(-50%,-50%) scale(0.5); }
    40% { opacity: 1; transform: translate(-50%,-80%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%,-130%) scale(0.8); }
  }

  /* ─── SCANLINES ─── */
  #scanlines {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
  }

  /* ─── CRT VIGNETTE ─── */
  #vignette {
    position: fixed;
    inset: 0;
    z-index: 49;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 55%,
      rgba(0,0,0,0.65) 100%
    );
  }

  /* ─── AMMO BAR ─── */
  #ammo-bar {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .ammo-pip {
    width: 6px; height: 10px;
    background: var(--neon-green);
    box-shadow: 0 0 4px var(--neon-green);
    transition: all 0.1s;
  }
  .ammo-pip.spent { background: #222; box-shadow: none; }

  /* ─── EMPTY MESSAGE ─── */
  #empty-msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #334;
    font-size: 7px;
    text-align: center;
    line-height: 2.5;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<!-- STARFIELD -->
<canvas id="starfield"></canvas>

<!-- PERSPECTIVE GRID -->
<div id="grid-floor"><canvas id="gridCanvas"></canvas></div>

<!-- GAME CANVAS -->
<canvas id="gameCanvas"></canvas>

<!-- SCANLINES + VIGNETTE -->
<div id="scanlines"></div>
<div id="vignette"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-box">
    <div><span class="label">SCORE</span></div>
    <div><span class="val" id="score-val">000000</span></div>
    <div style="margin-top:6px"><span class="label">KILLS</span></div>
    <div><span class="val" id="kills-val">00</span></div>
  </div>
  <div class="hud-box" style="text-align:right">
    <div><span class="label">AMMO</span></div>
    <div id="ammo-bar"></div>
    <div style="margin-top:6px"><span class="label">HEAT</span> <span class="val" id="heat-val">COOL</span></div>
  </div>
</div>

<!-- TASK SIDEBAR -->
<div id="task-sidebar">
  <h3>▶ ACTIVE THREATS</h3>
</div>

<!-- EMPTY MESSAGE -->
<div id="empty-msg">
  ADD A TASK BELOW<br>TO SPAWN A METEOR<br>
  <span style="color:#556;font-size:6px">CLICK TO SHOOT</span>
</div>

<!-- CROSSHAIR -->
<svg id="crosshair" width="32" height="32" viewBox="0 0 32 32">
  <line x1="16" y1="0" x2="16" y2="11" stroke="#ff0" stroke-width="2"/>
  <line x1="16" y1="21" x2="16" y2="32" stroke="#ff0" stroke-width="2"/>
  <line x1="0" y1="16" x2="11" y2="16" stroke="#ff0" stroke-width="2"/>
  <line x1="21" y1="16" x2="32" y2="16" stroke="#ff0" stroke-width="2"/>
  <rect x="12" y="12" width="8" height="8" fill="none" stroke="#ff0" stroke-width="2"/>
  <circle cx="16" cy="16" r="1.5" fill="#ff0"/>
</svg>

<!-- TASK INPUT -->
<div id="task-panel">
  <h2>⚡ SPAWN THREAT ⚡</h2>
  <div id="task-input-row">
    <input id="task-input" type="text" placeholder="Enter task name..." maxlength="30"/>
    <button id="add-btn">LAUNCH</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  TASK BLASTER 9000  –  16-bit Space Shooter
// ════════════════════════════════════════════

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ─── STARS ────────────────────────────────
const starCanvas = document.getElementById('starfield');
const sCtx = starCanvas.getContext('2d');
let stars = [];

function resizeStars() {
  starCanvas.width = W(); starCanvas.height = H();
  stars = Array.from({length: 200}, () => ({
    x: Math.random() * W(),
    y: Math.random() * H(),
    r: Math.random() * 1.5 + 0.3,
    speed: Math.random() * 0.3 + 0.05,
    bright: Math.random()
  }));
}

function drawStars() {
  sCtx.clearRect(0, 0, W(), H());
  stars.forEach(s => {
    s.bright += 0.02;
    const a = 0.4 + 0.6 * Math.abs(Math.sin(s.bright));
    sCtx.fillStyle = `rgba(255,255,255,${a})`;
    sCtx.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.r), Math.ceil(s.r));
  });
}

// ─── GRID FLOOR ───────────────────────────
const gridCv = document.getElementById('gridCanvas');
const gCtx = gridCv.getContext('2d');
let gridOff = 0;

function resizeGrid() {
  gridCv.width = gridCv.parentElement.clientWidth;
  gridCv.height = gridCv.parentElement.clientHeight;
}

function drawGrid() {
  const cw = gridCv.width, ch = gridCv.height;
  gCtx.clearRect(0, 0, cw, ch);

  const vp = { x: cw / 2, y: 0 };
  const cols = 20;
  const rows = 14;
  gridOff = (gridOff + 0.4) % (ch / rows);

  gCtx.strokeStyle = '#0a0a30';
  gCtx.lineWidth = 1;

  // Vertical lines perspective
  for (let i = 0; i <= cols; i++) {
    const bx = (i / cols) * cw;
    gCtx.beginPath();
    gCtx.moveTo(vp.x, vp.y);
    gCtx.lineTo(bx, ch);
    const t = i / cols;
    const alpha = 0.08 + 0.25 * (1 - Math.abs(t - 0.5) * 2);
    gCtx.strokeStyle = `rgba(0, 80, 255, ${alpha})`;
    gCtx.stroke();
  }

  // Horizontal lines with perspective scroll
  for (let j = 0; j <= rows; j++) {
    const t = (j / rows + gridOff / ch) % 1;
    const ease = Math.pow(t, 1.8);
    const y = ease * ch;
    const alpha = 0.05 + ease * 0.3;
    gCtx.beginPath();
    const xl = vp.x - ease * cw * 0.55;
    const xr = vp.x + ease * cw * 0.55;
    gCtx.moveTo(xl, y);
    gCtx.lineTo(xr, y);
    gCtx.strokeStyle = `rgba(0, 80, 255, ${alpha})`;
    gCtx.lineWidth = ease * 1.5;
    gCtx.stroke();
  }
}

// ─── GAME STATE ───────────────────────────
const gameCanvas = document.getElementById('gameCanvas');
const ctx = gameCanvas.getContext('2d');

let tasks = [];       // {id, text, meteor}
let meteors = [];     // active meteor objects
let particles = [];   // explosion particles
let lasers = [];      // laser beams
let score = 0;
let kills = 0;
let ammo = 12;
let maxAmmo = 12;
let heatLevel = 0;
let mouseX = W()/2, mouseY = H()/2;
let taskIdCounter = 0;

function resizeGame() {
  gameCanvas.width = W(); gameCanvas.height = H();
}

// ─── METEOR CLASS ─────────────────────────
const METEOR_COLORS = [
  ['#8B4513','#5C2D0A','#A0522D'],
  ['#556B2F','#2D4A1A','#6B8B3A'],
  ['#4A4A6A','#2A2A4A','#6A6A8A'],
  ['#8B2020','#5A1010','#AA4040'],
];

const MAX_HP = 5;
let spawnSlotIndex = 0;
function nextSpawnSlot() {
  const slots = 5;
  const slot = spawnSlotIndex % slots;
  spawnSlotIndex++;
  return W() * (0.15 + (slot / (slots - 1)) * 0.70);
}

class Meteor {
  constructor(taskId, text) {
    this.taskId = taskId;
    this.text = text;
    this.vpX = nextSpawnSlot();
    this.vpY = H() * (0.18 + Math.random() * 0.10);
    this.x = this.vpX;
    this.y = this.vpY;
    this.z = 0;
    this.speed = 0.0005 + Math.random() * 0.0004;
    this.driftX = (Math.random() - 0.5) * 0.15;
    this.driftY = (Math.random() - 0.5) * 0.05;
    this.angle = Math.random() * Math.PI * 2;
    this.spin = (Math.random() - 0.5) * 0.03;
    this.colors = METEOR_COLORS[Math.floor(Math.random() * METEOR_COLORS.length)];
    this.alive = true;
    this.hp = MAX_HP;
    this.hitFlash = 0;
    this.glowPhase = Math.random() * Math.PI * 2;
    this.craters = Array.from({length: 3 + Math.floor(Math.random()*3)}, () => ({
      ox: (Math.random()-0.5)*0.5, oy: (Math.random()-0.5)*0.5, r: 0.05 + Math.random()*0.10
    }));
    this.cracks = Array.from({length: MAX_HP - 1}, () => ({
      a: Math.random() * Math.PI * 2, len: 0.3 + Math.random() * 0.4
    }));
  }

  get size() { return 10 + this.z * 55; }

  get screenX() { return this.vpX + (this.x - this.vpX) * this.z + this.driftX * this.z * 60; }

  get screenY() { return this.vpY + (this.y - this.vpY) * this.z + this.driftY * this.z * 40; }

  update() {
    if (!this.alive) return;
    this.z = Math.min(1, this.z + this.speed);
    this.angle += this.spin;
    this.glowPhase += 0.05;
    if (this.hitFlash > 0) this.hitFlash--;
  }

  draw(ctx) {
    if (!this.alive) return;
    const x = this.screenX, y = this.screenY;
    const r = this.size;
    const hpFrac = this.hp / MAX_HP;

    ctx.save();
    ctx.translate(Math.round(x), Math.round(y));
    ctx.rotate(this.angle);

    // Glow — redder as hp drops
    const glowA = 0.12 + 0.08 * Math.sin(this.glowPhase);
    const gr = Math.floor(255 * (1 - hpFrac * 0.7));
    const gg = Math.floor(80 * hpFrac);
    const grd = ctx.createRadialGradient(0, 0, r*0.4, 0, 0, r*1.6);
    grd.addColorStop(0, `rgba(${gr},${gg},40,${glowA})`);
    grd.addColorStop(1, `rgba(${gr},${gg},40,0)`);
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(0, 0, r*1.6, 0, Math.PI*2); ctx.fill();

    // Hit flash
    if (this.hitFlash > 0) {
      ctx.globalAlpha = (this.hitFlash / 6) * 0.6;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Pixel body
    const step = Math.max(2, Math.floor(r / 7));
    const iR = Math.ceil(r);
    for (let py = -iR; py <= iR; py += step) {
      for (let px2 = -iR; px2 <= iR; px2 += step) {
        const dist = Math.sqrt(px2*px2 + py*py);
        if (dist > r) continue;
        const nx = px2/r, ny = py/r;
        const light = Math.max(0, (-nx*0.5 - ny*0.7));
        const shade = Math.max(0, (nx*0.4 + ny*0.6));
        let col = this.colors[0];
        if (dist > r*0.7) col = this.colors[1];
        else if (dist > r*0.4 && Math.sin(px2*3+py*2) > 0.2) col = this.colors[2];
        for (const c of this.craters) {
          if (Math.sqrt((px2-c.ox*r)**2+(py-c.oy*r)**2) < c.r*r) { col = this.colors[1]; break; }
        }
        const rgb = hexToRgb(col);
        const dmgDark = (1-hpFrac)*60;
        ctx.fillStyle = `rgb(${Math.floor(Math.min(255,Math.max(0,rgb.r+light*70-shade*50-dmgDark)))},${Math.floor(Math.min(255,Math.max(0,rgb.g+light*50-shade*40-dmgDark)))},${Math.floor(Math.min(255,Math.max(0,rgb.b+light*25-shade*35-dmgDark)))})`;
        ctx.fillRect(px2, py, step, step);
      }
    }

    // Cracks
    const cracksVisible = MAX_HP - this.hp;
    ctx.strokeStyle = '#1a0800'; ctx.lineWidth = 1;
    for (let i = 0; i < cracksVisible && i < this.cracks.length; i++) {
      const c = this.cracks[i];
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(c.a)*r*c.len, Math.sin(c.a)*r*c.len); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(Math.cos(c.a)*r*c.len*0.5, Math.sin(c.a)*r*c.len*0.5);
      ctx.lineTo(Math.cos(c.a+0.8)*r*c.len*0.3, Math.sin(c.a+0.8)*r*c.len*0.3); ctx.stroke();
    }

    // Outline
    ctx.strokeStyle = this.colors[1]; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();

    // Label
    if (r > 22) {
      ctx.rotate(-this.angle);
      const fontSize = Math.max(4, Math.min(7, Math.floor(r/7)));
      ctx.font = `${fontSize}px 'Press Start 2P', monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const maxChars = Math.max(4, Math.floor(r*1.6/fontSize));
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillText(truncText(this.text, maxChars), 1, 1);
      ctx.fillStyle = this.hp <= 1 ? '#ff4444' : '#ffee00';
      ctx.fillText(truncText(this.text, maxChars), 0, 0);
    }
    ctx.restore();

    // HP bar above meteor
    this._drawHPBar(ctx, x, y, r);
  }

  _drawHPBar(ctx, x, y, r) {
    const bw = Math.max(28, r*2.2), bh = 4;
    const bx = x - bw/2, by = y - r - 10;
    ctx.fillStyle = '#111';
    ctx.fillRect(Math.round(bx), Math.round(by), Math.round(bw), bh);
    const hpFrac = this.hp / MAX_HP;
    ctx.fillStyle = hpFrac > 0.6 ? '#00ff88' : hpFrac > 0.3 ? '#ffee00' : '#ff3300';
    ctx.fillRect(Math.round(bx), Math.round(by), Math.round(bw*hpFrac), bh);
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
    ctx.strokeRect(Math.round(bx), Math.round(by), Math.round(bw), bh);
    for (let i = 1; i < MAX_HP; i++) {
      ctx.fillStyle = '#111';
      ctx.fillRect(Math.round(bx + bw*(i/MAX_HP)), Math.round(by), 1, bh);
    }
  }

  isHit(mx, my) {
    const dx = mx - this.screenX, dy = my - this.screenY;
    return Math.sqrt(dx*dx+dy*dy) < this.size;
  }
}

// ─── LASER CLASS ──────────────────────────
class Laser {
  constructor(fromX, fromY, toX, toY) {
    this.x1 = fromX; this.y1 = fromY;
    this.x2 = toX; this.y2 = toY;
    this.life = 1;
    this.decay = 0.08;
  }
  update() { this.life -= this.decay; }
  draw(ctx) {
    if (this.life <= 0) return;
    const a = this.life;
    // Outer glow
    ctx.strokeStyle = `rgba(255,80,0,${a*0.3})`;
    ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(this.x1,this.y1); ctx.lineTo(this.x2,this.y2); ctx.stroke();
    // Core
    ctx.strokeStyle = `rgba(255,220,80,${a})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(this.x1,this.y1); ctx.lineTo(this.x2,this.y2); ctx.stroke();
    // Tip
    ctx.strokeStyle = `rgba(255,255,255,${a})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(this.x1,this.y1); ctx.lineTo(this.x2,this.y2); ctx.stroke();
  }
  get dead() { return this.life <= 0; }
}

// ─── PARTICLE CLASS ───────────────────────
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5) * 8;
    this.vy = (Math.random()-0.5) * 8;
    this.life = 1;
    this.decay = 0.04 + Math.random()*0.04;
    this.size = 2 + Math.floor(Math.random()*5);
    this.color = color;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.15;
    this.life -= this.decay;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.fillStyle = this.color.replace(')', `,${this.life})`).replace('rgb','rgba');
    ctx.fillRect(Math.round(this.x), Math.round(this.y), this.size, this.size);
  }
  get dead() { return this.life <= 0; }
}

// ─── GUN SPRITE ───────────────────────────
function drawGun(ctx, mx, my) {
  const cx = W()/2, cy = H();
  const dx = mx - cx, dy = my - cy;
  const angle = Math.atan2(dy, dx);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle - Math.PI/2);

  const s = 3; // pixel scale

  // Gun body — pixel art
  const pixels = [
    // [col, row, colorIdx]
    [3,0,'#334'],[4,0,'#334'],
    [2,1,'#445'],[3,1,'#667'],[4,1,'#667'],[5,1,'#445'],
    [1,2,'#334'],[2,2,'#889'],[3,2,'#aab'],[4,2,'#aab'],[5,2,'#889'],[6,2,'#334'],
    [1,3,'#334'],[2,3,'#667'],[3,3,'#889'],[4,3,'#889'],[5,3,'#667'],[6,3,'#334'],
    [2,4,'#445'],[3,4,'#556'],[4,4,'#556'],[5,4,'#445'],
    [3,5,'#ff3300'],[4,5,'#ff3300'], // energy cell
    [2,6,'#334'],[3,6,'#445'],[4,6,'#445'],[5,6,'#334'],
    [2,7,'#223'],[3,7,'#334'],[4,7,'#334'],[5,7,'#223'],
    [2,8,'#667'],[3,8,'#889'],[4,8,'#889'],[5,8,'#667'],
    [3,9,'#aab'],[4,9,'#aab'],
    [3,10,'#889'],[4,10,'#889'],
  ];

  const ox = -3.5 * s, oy = -5 * s;

  for (const [col, row, color] of pixels) {
    ctx.fillStyle = color;
    ctx.fillRect(ox + col*s, oy + row*s, s, s);
  }

  // Muzzle glow
  ctx.fillStyle = 'rgba(255,200,0,0.6)';
  ctx.fillRect(ox + 3*s, oy - s, s*2, s);

  ctx.restore();
}

// ─── HELPERS ──────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function truncText(t, maxLen) {
  return t.length > maxLen ? t.slice(0, maxLen-1)+'…' : t;
}

function pad(n, len) { return String(n).padStart(len,'0'); }

function updateHUD() {
  document.getElementById('score-val').textContent = pad(score, 6);
  document.getElementById('kills-val').textContent = pad(kills, 2);
  document.getElementById('heat-val').textContent =
    heatLevel < 3 ? 'COOL' : heatLevel < 7 ? 'WARM' : 'HOT!';
  // Ammo pips
  const bar = document.getElementById('ammo-bar');
  bar.innerHTML = '';
  for (let i = 0; i < maxAmmo; i++) {
    const d = document.createElement('div');
    d.className = 'ammo-pip' + (i < ammo ? '' : ' spent');
    bar.appendChild(d);
  }
}

function updateSidebar() {
  const sb = document.getElementById('task-sidebar');
  const header = sb.querySelector('h3');
  sb.innerHTML = '';
  sb.appendChild(header);
  tasks.forEach(t => {
    const div = document.createElement('div');
    div.className = 'task-entry' + (t.destroyed ? ' destroyed' : '');
    // HP pips
    let hpStr = '';
    if (!t.destroyed && t.meteor && t.meteor.alive) {
      const hp = t.meteor.hp;
      hpStr = `<div class="task-hp">${'█'.repeat(hp)}${'░'.repeat(MAX_HP - hp)}</div>`;
    } else if (t.destroyed) {
      hpStr = `<div class="task-hp" style="color:#333">✓ DONE</div>`;
    }
    div.innerHTML = `<div>${escHtml(t.text)}</div>${hpStr}`;
    sb.appendChild(div);
  });
  document.getElementById('empty-msg').style.display =
    tasks.length === 0 ? 'block' : 'none';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── ADD TASK ─────────────────────────────
function addTask(text) {
  if (!text.trim()) return;
  const id = taskIdCounter++;
  const meteor = new Meteor(id, text);
  meteors.push(meteor);
  tasks.push({ id, text, destroyed: false, meteor });
  updateSidebar();
  updateHUD();
}

// ─── SHOOT ────────────────────────────────
function shoot(mx, my) {
  if (ammo <= 0) return;
  ammo--;
  heatLevel = Math.min(10, heatLevel + 1);

  const gunX = W()/2, gunY = H();
  lasers.push(new Laser(gunX, gunY, mx, my));

  // Muzzle flash
  const flash = document.createElement('div');
  flash.className = 'muzzle-flash';
  flash.style.cssText = `left:${gunX}px;top:${gunY-20}px;width:30px;height:30px;background:radial-gradient(circle,#fff 0%,#ff8 40%,transparent 70%);`;
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 200);

  // Hit detection
  let hit = false;
  for (const m of meteors) {
    if (!m.alive) continue;
    if (m.isHit(mx, my)) {
      m.hp--;
      m.hitFlash = 6;
      // Spark on hit
      const cols = ['rgb(255,150,50)','rgb(255,220,80)','rgb(255,255,150)'];
      for (let i = 0; i < 8; i++) {
        particles.push(new Particle(mx, my, cols[i%cols.length]));
      }
      if (m.hp <= 0) {
        explodeMeteor(m, mx, my);
      } else {
        // Show damage hit text
        const dmgWords = ['HIT!',`${m.hp} LEFT`,`-1 HP`];
        const boom = document.createElement('div');
        boom.className = 'boom-text';
        boom.style.color = m.hp <= 1 ? '#ff4444' : '#ffaa00';
        boom.style.textShadow = `0 0 10px ${m.hp <= 1 ? '#ff4444' : '#ffaa00'}`;
        boom.style.fontSize = '7px';
        boom.textContent = dmgWords[Math.floor(Math.random()*dmgWords.length)];
        boom.style.left = mx + 'px';
        boom.style.top = my + 'px';
        document.body.appendChild(boom);
        setTimeout(() => boom.remove(), 700);
        updateSidebar();
      }
      hit = true;
      break;
    }
  }

  // Miss spark
  if (!hit) {
    for (let i = 0; i < 6; i++) {
      particles.push(new Particle(mx, my, 'rgb(255,200,80)'));
    }
  }

  // Reload
  if (ammo === 0) {
    setTimeout(() => {
      ammo = maxAmmo;
      heatLevel = 0;
      updateHUD();
    }, 1200);
  }

  updateHUD();
}

function explodeMeteor(m, mx, my) {
  m.alive = false;
  score += Math.floor(100 + m.z * 400);
  kills++;

  // Mark task destroyed
  const t = tasks.find(t => t.id === m.taskId);
  if (t) t.destroyed = true;

  // Particles
  const cols = ['rgb(255,120,40)','rgb(255,200,80)','rgb(200,80,20)','rgb(255,255,100)','rgb(150,70,30)'];
  for (let i = 0; i < 30; i++) {
    const p = new Particle(mx, my, cols[i % cols.length]);
    p.vx *= 1.5; p.vy *= 1.5;
    particles.push(p);
  }

  // Boom text
  const words = ['BOOM!','BLASTED!','NAILED IT!','ZAP!','DONE!'];
  const boom = document.createElement('div');
  boom.className = 'boom-text';
  boom.textContent = words[Math.floor(Math.random()*words.length)];
  boom.style.left = mx + 'px';
  boom.style.top = my + 'px';
  document.body.appendChild(boom);
  setTimeout(() => boom.remove(), 900);

  updateSidebar();
  updateHUD();
}

// ─── MAIN LOOP ────────────────────────────
function loop() {
  requestAnimationFrame(loop);

  drawStars();
  drawGrid();

  ctx.clearRect(0, 0, W(), H());

  // Update + draw meteors
  for (const m of meteors) {
    m.update();
    m.draw(ctx);
  }
  meteors = meteors.filter(m => m.alive || m.z < 1);

  // Lasers
  for (const l of lasers) { l.update(); l.draw(ctx); }
  lasers = lasers.filter(l => !l.dead);

  // Particles
  for (const p of particles) { p.update(); p.draw(ctx); }
  particles = particles.filter(p => !p.dead);

  // Gun
  drawGun(ctx, mouseX, mouseY);

  // Cool down heat
  if (heatLevel > 0 && Math.random() < 0.01) {
    heatLevel = Math.max(0, heatLevel - 1);
    updateHUD();
  }
}

// ─── INPUT ────────────────────────────────
document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  const ch = document.getElementById('crosshair');
  ch.style.left = mouseX + 'px';
  ch.style.top = mouseY + 'px';
});

document.addEventListener('click', e => {
  const panel = document.getElementById('task-panel');
  const input = document.getElementById('task-input');
  if (panel.contains(e.target)) return;
  if (input === document.activeElement) return;
  shoot(e.clientX, e.clientY);
});

document.getElementById('add-btn').addEventListener('click', () => {
  const inp = document.getElementById('task-input');
  addTask(inp.value);
  inp.value = '';
  inp.focus();
});

document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    addTask(e.target.value);
    e.target.value = '';
  }
});

// ─── RESIZE ───────────────────────────────
window.addEventListener('resize', () => {
  resizeStars(); resizeGame(); resizeGrid();
});

// ─── INIT ─────────────────────────────────
resizeStars(); resizeGame(); resizeGrid();
updateHUD();
updateSidebar();
loop();

// Demo task after 1s
setTimeout(() => {
  // no auto-spawn, let user do it
}, 1000);
</script>
